{% load static %}
<header id="site-header" class="sticky top-0 z-50 border-b border-slate-200 bg-white">
  <!-- Десктоп: как на макете — логотип слева, ссылки по центру полосы, «Служба заботы» справа -->
  <div class="mx-auto hidden w-full max-w-7xl items-center justify-between gap-3 px-4 py-3 sm:gap-4 sm:px-6 md:flex lg:gap-6 lg:px-8">
    <a href="{% url 'home' %}" class="flex shrink-0 items-center">
      <img
        src="{% static 'media/branding/logo-main.webp' %}"
        alt="Сибирские газоны"
        class="h-9 w-auto sm:h-10"
        loading="eager"
        decoding="async"
      />
    </a>
    <nav
      class="flex min-w-0 flex-1 flex-nowrap items-center justify-center gap-x-3 gap-y-2 overflow-x-auto px-2 py-0.5 sm:gap-x-4 sm:px-3 lg:gap-x-5 lg:px-4 [scrollbar-width:none] [-ms-overflow-style:none] [&::-webkit-scrollbar]:hidden"
      aria-label="Основное меню"
    >
      <a href="{% url 'home' %}" class="whitespace-nowrap py-1.5 text-[15px] text-slate-700 transition hover:text-brand sm:text-[16px]">
        Главная
      </a>
      <a href="{% url 'gazon' %}" class="whitespace-nowrap py-1.5 text-[15px] text-slate-700 transition hover:text-brand sm:text-[16px]">
        Газон
      </a>
      <a href="{% url 'ozelenenie_b2c' %}" class="whitespace-nowrap py-1.5 text-[15px] text-slate-700 transition hover:text-brand sm:text-[16px]">
        Озеленение
      </a>
      <a href="{% url 'b2b' %}" class="whitespace-nowrap py-1.5 text-[15px] text-slate-700 transition hover:text-brand sm:text-[16px]">
        B2B
      </a>
      <a href="{% url 'pitomnik' %}" class="whitespace-nowrap py-1.5 text-[15px] text-slate-700 transition hover:text-brand sm:text-[16px]">
        Питомник
      </a>
      <a href="{% url 'sadovye_centry' %}" class="whitespace-nowrap py-1.5 text-[15px] text-slate-700 transition hover:text-brand sm:text-[16px]">
        Садовые центры
      </a>
      <a href="{% url 'katalog' %}" class="whitespace-nowrap py-1.5 text-[15px] text-slate-700 transition hover:text-brand sm:text-[16px]">
        Каталог
      </a>
      <a href="{% url 'stati_list' %}" class="whitespace-nowrap py-1.5 text-[15px] text-slate-700 transition hover:text-brand sm:text-[16px]">
        Статьи
      </a>
      <a href="{% url 'kontakty' %}" class="whitespace-nowrap py-1.5 text-[15px] text-slate-700 transition hover:text-brand sm:text-[16px]">
        Контакты
      </a>
    </nav>
    <a
      href="{% url 'sluzhba_zaboty' %}"
      class="nav-zaboty-pill inline-flex shrink-0 items-center justify-center gap-2 rounded-2xl bg-gradient-to-r from-brand to-brand2 px-5 py-2 text-sm font-semibold text-white shadow-glow transition hover:brightness-105 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-brand sm:px-6 sm:py-2.5 sm:text-[15px]"
    >
      <i data-lucide="headphones" class="h-4 w-4 shrink-0 sm:h-[18px] sm:w-[18px]" stroke-width="2"></i>
      Служба заботы
    </a>
  </div>

  <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
    <!-- Мобильная верхняя строка: лого + действия -->
    <div class="flex items-center justify-between gap-3 py-2.5 md:hidden">
      <a href="{% url 'home' %}" class="flex min-w-0 items-center">
        <img
          src="{% static 'media/branding/logo-main.webp' %}"
          alt="Сибирские газоны"
          class="h-9 w-auto max-h-9"
          loading="eager"
          decoding="async"
        />
      </a>
      <div class="flex shrink-0 items-center gap-2">
        <button
          type="button"
          data-open-modal="contact_zaboty"
          data-modal-title="Заказать звонок"
          class="inline-flex items-center justify-center rounded-full border-2 border-brand bg-white px-3 py-1.5 text-xs font-semibold text-brand"
        >
          Звонок
        </button>
        <button
          id="burgerBtn"
          type="button"
          class="inline-flex items-center justify-center rounded-xl border border-slate-200 p-2 text-slate-700 hover:bg-slate-50 transition"
          aria-label="Открыть меню"
          aria-expanded="false"
        >
          <i data-lucide="menu" class="h-5 w-5"></i>
        </button>
      </div>
    </div>
  </div>

  <div id="mobileMenu" class="hidden border-b border-slate-200 bg-white md:hidden">
    <div class="mx-auto max-w-7xl px-4 py-4 sm:px-6 lg:px-8">
      <div class="grid grid-cols-1 gap-1">
        <a href="{% url 'home' %}" class="rounded-xl px-3 py-2.5 text-sm font-medium text-slate-700 hover:bg-brand/5 hover:text-brand transition">
          Главная
        </a>
        <a href="{% url 'gazon' %}" class="rounded-xl px-3 py-2.5 text-sm font-medium text-slate-700 hover:bg-brand/5 hover:text-brand transition">
          Газон
        </a>
        <a href="{% url 'ozelenenie_b2c' %}" class="rounded-xl px-3 py-2.5 text-sm font-medium text-slate-700 hover:bg-brand/5 hover:text-brand transition">
          Озеленение
        </a>
        <a href="{% url 'b2b' %}" class="rounded-xl px-3 py-2.5 text-sm font-medium text-slate-700 hover:bg-brand/5 hover:text-brand transition">
          B2B
        </a>
        <a href="{% url 'pitomnik' %}" class="rounded-xl px-3 py-2.5 text-sm font-medium text-slate-700 hover:bg-brand/5 hover:text-brand transition">
          Питомник
        </a>
        <a href="{% url 'sadovye_centry' %}" class="rounded-xl px-3 py-2.5 text-sm font-medium text-slate-700 hover:bg-brand/5 hover:text-brand transition">
          Садовые центры
        </a>
        <a href="{% url 'katalog' %}" class="rounded-xl px-3 py-2.5 text-sm font-medium text-slate-700 hover:bg-brand/5 hover:text-brand transition">
          Каталог
        </a>
        <a
          href="{% url 'sluzhba_zaboty' %}"
          class="nav-zaboty-pill mt-1 inline-flex items-center justify-center gap-2 rounded-2xl bg-gradient-to-r from-brand to-brand2 px-4 py-3 text-sm font-semibold text-white shadow-glow transition hover:brightness-105"
        >
          <i data-lucide="headphones" class="h-4 w-4 shrink-0" stroke-width="2"></i>
          Служба заботы
        </a>
        <a href="{% url 'stati_list' %}" class="rounded-xl px-3 py-2.5 text-sm font-medium text-slate-700 hover:bg-brand/5 hover:text-brand transition">
          Статьи
        </a>
        <a href="{% url 'kontakty' %}" class="rounded-xl px-3 py-2.5 text-sm font-medium text-slate-700 hover:bg-brand/5 hover:text-brand transition">
          Контакты
        </a>
      </div>
    </div>
  </div>
</header>
