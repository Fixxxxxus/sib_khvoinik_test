{% extends 'base.html' %}
{% block title %}{{ title }} — {{ brand }}{% endblock %}

{% block content %}
  <section class="mt-10">
    <div class="mx-auto max-w-7xl px-4 sm:px-6 lg:px-8">
      <div class="rounded-3xl border border-black/5 bg-white p-8 md:p-12" data-animate="fadeInUp">
        <h1 class="text-3xl font-semibold leading-tight">Статьи</h1>
        <p class="mt-3 text-slate-600 max-w-3xl">SEO-раздел: короткие и практичные материалы об уходе и выборе решений.</p>
        <div class="mt-6 flex flex-col sm:flex-row gap-3">
          <button type="button" data-open-modal="contact_zaboty" data-modal-title="Получить консультацию" class="inline-flex items-center justify-center rounded-2xl bg-gradient-to-r from-brand to-brand2 px-6 py-3 text-white font-semibold shadow-glow hover:brightness-105 transition">
            Получить консультацию
          </button>
          <a href="{% url 'katalog' %}" class="inline-flex items-center justify-center rounded-2xl border border-black/10 px-6 py-3 font-semibold hover:bg-black/5 transition">
            Перейти в каталог
          </a>
        </div>
      </div>

      <div class="mt-8 grid grid-cols-1 md:grid-cols-3 gap-4">
        {% for a in articles %}
          <a href="{% url 'stati_detail' article_slug=a.slug %}" class="rounded-3xl border border-black/5 bg-white p-6 hover:shadow-glow transition" data-animate="fadeInUp">
            <div class="h-28 rounded-2xl bg-gradient-to-br from-black/90 via-black/30 to-brand/20"></div>
            <div class="mt-4 font-semibold">{{ a.title }}</div>
            <div class="mt-2 text-sm text-slate-600">{{ a.excerpt }}</div>
            <div class="mt-4 inline-flex items-center gap-2 text-sm font-semibold text-brand">
              Читать <i data-lucide="chevron-right" class="h-4 w-4"></i>
            </div>
          </a>
        {% endfor %}
      </div>
    </div>
  </section>
{% endblock %}
